# Automatically validate generated project data, packwiz metadata, and .mrpack
# exports on every push and pull request.

name: build

env:
  GO_VERSION: '1.23.0'
  PACKWIZ_VERSION: 'v0.0.0-20260218225342-dfd8b68a4796'

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: install packwiz
        run: |
          go install "github.com/packwiz/packwiz@${PACKWIZ_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: check project data consistency
        run: python tools/update_project_data.py check

      - name: ensure consistency check is read-only
        run: git diff --exit-code -- data docs

      - name: check packwiz index
        run: |
          python tools/refresh_packwiz.py
          git diff --exit-code -- pack.toml index.toml

      - name: export modrinth pack
        run: |
          mkdir -p dist
          packwiz modrinth export -o "dist/sea-salt-vanilla-${{ github.sha }}.mrpack"

      - name: capture export artifact
        uses: actions/upload-artifact@v7
        with:
          name: modrinth-pack-export
          path: dist/*.mrpack
          retention-days: 7
